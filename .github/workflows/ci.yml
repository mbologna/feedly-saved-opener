name: CI

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: mbologna/.github/.github/workflows/node-ci.yml@d19f016152450c5c8139f1deeba411bd0a2b6b40 # main
    with:
      node_version: "18"
      package_manager: npm
      test_command: test
      build_command: bash build-extension.sh
      build_artifact_name: extension-build
      build_artifact_path: dist/*.zip
      build_artifact_retention_days: 30

  auto-release:
    if: github.event_name == 'schedule'
    uses: mbologna/.github/.github/workflows/auto-release.yml@17e62b3f3f9e7985d155f652d47162ffada15cb6 # main
    with:
      strategy: commits
    secrets: inherit
