name: CI

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: mbologna/.github/.github/workflows/node-ci.yml@bc67bfd693eafaf8371ae6ba2626e1f977ab3311 # main
    with:
      node_version: "18"
      package_manager: npm
      test_command: test

  build:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install dependencies
        run: npm install
      - name: Build extension
        run: bash build-extension.sh
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: extension-build
          path: dist/*.zip
          retention-days: 30

  auto-release:
    if: github.event_name == 'schedule'
    uses: mbologna/.github/.github/workflows/auto-release.yml@bc67bfd693eafaf8371ae6ba2626e1f977ab3311 # main
    with:
      strategy: commits
    secrets: inherit
